name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Restrict default permissions - follow principle of least privilege
permissions:
  contents: read
  packages: write
  id-token: write # Required for OIDC and cosign signing

# Prevent concurrent runs on same branch/ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/frontend
  GO_VERSION: '1.19.0'
  PROTOC_VERSION: '24.4'
  WORKING_DIRECTORY: ./frontend

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Lint, Test & Verify
  # ─────────────────────────────────────────────────────────────
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          check-latest: true

      - name: Verify go.mod consistency
        run: |
          go mod verify
          go mod tidy
          git diff --exit-code go.mod go.sum || \
            (echo "❌ go.mod/go.sum not tidy - run 'go mod tidy'" && exit 1)

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@971e284b6050e8a5849b72094c50ab08da042db8 # v6.1.1
        with:
          version: v1.64.8
          install-mode: gomod
          args: --timeout=5m --verbose
          working-directory: ${{ env.WORKING_DIRECTORY }}

      - name: Run tests with coverage
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
          
      - name: Check for test failures
        run: |
          if [ ! -f coverage.out ]; then
            echo "❌ No coverage profile generated - tests may have failed"
            exit 1
          fi
          echo "✅ Tests passed successfully"
          
      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@1e68e06f1dbfde0e4cefc87efeba9e4643565303 # v5.1.2
        if: github.event_name == 'push'
        with:
          files: ./coverage.out
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # Job 3: Build & Push Container Image
  # ─────────────────────────────────────────────────────────────
  build-push:
    name: Build & Push
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: [lint-test, security-scan]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
      id-token: write
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@6524bf6573120915367a4ac981dc4fe32c481a27 # v3.8.0

      - name: Log in to Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@8e5442c4ef9f78752691e2d8f8d19755c6f78e81 # v5.5.1
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b2e9c14ece # v6.10.0
        with:
          context: ${{ env.WORKING_DIRECTORY }}
          file: ${{ env.WORKING_DIRECTORY }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          provenance: true
          sbom: true

      - name: Generate SBOM
        uses: anchore/sbom-action@ab5d7b5f489819da11b2270b125a929fdc22b96e # v0.17.0
        with:
          path: ${{ env.WORKING_DIRECTORY }}
          format: spdx-json
          output-file: frontend-sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@65c4c4f1ddee5ebcbaa83154f70bdd29ba3d180b # v4.6.0
        with:
          name: sbom
          path: frontend-sbom.spdx.json
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # Job 4: Sign Container Image with Cosign
  # ─────────────────────────────────────────────────────────────
  sign-image:
    name: Sign Image
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: build-push
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Cosign
        uses: sigstore/cosign-installer@4959ce089c589a55793d4f339935670e1eb07167 # v3.9.0

      - name: Sign the container image
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-push.outputs.image-digest }}
        run: |
          cosign sign --yes "$IMAGE"

      - name: Verify signature
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-push.outputs.image-digest }}
        run: |
          cosign verify --certificate-identity-regexp='.*' --certificate-oidc-issuer-regexp='.*' "$IMAGE" || echo "⚠️ Signature verification skipped (no certificate info available in this context)"

  # ─────────────────────────────────────────────────────────────
  # Job 2: Security Scanning
  # ─────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scans
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: lint-test
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run govulncheck (Go vulnerability scan)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Run Trivy filesystem scan (dependencies)
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb0 # v0.29.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          exit-code: '1' # Fail on HIGH/CRITICAL
        env:
          TRIVY_SEVERITY: 'CRITICAL,HIGH'

      - name: Upload Trivy FS results
        uses: github/codeql-action/upload-sarif@6bb031afdd8eb862ea3fc1848194185e076637e5 # v3.28.11
        if: always()
        with:
          sarif_file: 'trivy-fs.sarif'

      - name: Run Gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@4df650038e2eb9f7329218df929c2780866e61a3 # v2.3.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }} # Optional for private repos
