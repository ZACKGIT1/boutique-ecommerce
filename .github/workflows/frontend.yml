name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Restrict default permissions - follow principle of least privilege
permissions:
  contents: read
  packages: write
  id-token: write # Required for OIDC and cosign signing

# Prevent concurrent runs on same branch/ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/frontend
  GO_VERSION: '1.25.6'
  PROTOC_VERSION: '24.4'
  WORKING_DIRECTORY: ./frontend

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Lint, Test & Verify
  # ─────────────────────────────────────────────────────────────
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          check-latest: true

      - name: Verify go.mod consistency
        run: |
          go mod verify
          go mod tidy
          git diff --exit-code go.mod go.sum || \
            (echo "❌ go.mod/go.sum not tidy - run 'go mod tidy'" && exit 1)

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@971e284b6050e8a5849b72094c50ab08da042db8 # v6.1.1
        with:
          version: v1.64.8
          install-mode: gomod
          args: --timeout=5m --verbose
          working-directory: ${{ env.WORKING_DIRECTORY }}

      - name: Run tests with coverage
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
          
      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@1e68e06f1dbfde0e4cefc87efeba9e4643565303 # v5.1.2
        if: github.event_name == 'push'
        with:
          files: ./coverage.out
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # Job 2: Security Scanning
  # ─────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scans
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: lint-test
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run govulncheck (Go vulnerability scan)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Run Trivy filesystem scan (dependencies)
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb0 # v0.29.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          exit-code: '1' # Fail on HIGH/CRITICAL
        env:
          TRIVY_SEVERITY: 'CRITICAL,HIGH'

      - name: Upload Trivy FS results
        uses: github/codeql-action/upload-sarif@6bb031afdd8eb862ea3fc1848194185e076637e5 # v3.28.11
        if: always()
        with:
          sarif_file: 'trivy-fs.sarif'

      - name: Run Gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@4df650038e2eb9f7329218df929c2780866e61a3 # v2.3.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }} # Optional for private repos
